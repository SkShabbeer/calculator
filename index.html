<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator-wrapper">

        <!-- Animated Heading -->
        <h1 id="typing">Calculator</h1>

        <!-- Calculator -->
        <div id="calculator">

            <!-- Display -->
            <input type="text" id="display" value="0" readonly>

            <!-- Buttons -->
            <div id="keys">

                <button onclick="clearDisplay()" class="operator_btn">C</button>
                <button onclick="backspace()" class="operator_btn">⌫</button>
                <button onclick="toggleHistory()" id="historyBtn">📜</button>
                <button onclick="appendToDisplay('/')" class="operator_btn">÷</button>

                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('*')" class="operator_btn">×</button>

                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('-')" class="operator_btn">−</button>

                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('+')" class="operator_btn">+</button>

                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button onclick="appendToDisplay('#')">#</button>
                <button onclick="calculate()" class="equal_btn">=</button>

            </div>

        </div>

        <!-- History Popup -->
        <div id="history">

            <h3>History</h3>

            <p id="history1">No Calculations</p>
            <p id="history2"></p>

        </div>

        <!-- Copyright -->
        <footer id="copyright">
            © 2026 | Designed & Developed by <strong>Shabbeer Shaik</strong>
        </footer>

    </div>

    <script src="index.js"></script>

</body>

</html>
